<section class="shipment-section">

<h1>Customer Management</h1>

<div class="shipment-form">

<input
type="text"
id="customerName"
placeholder="Customer Name">

<input
type="email"
id="customerEmail"
placeholder="Email">

<input
type="text"
id="customerPhone"
placeholder="Phone">

<button onclick="saveCustomer()">

Add Customer

</button>

</div>

</section>

<section class="shipment-list-section">

    <input
type="text"
id="customerSearch"
placeholder="Search Customer"
onkeyup="searchCustomer()">

<table>

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="customerTable">

</tbody>

</table>

</section>

<script src="js/customers.js"></script>

loadCustomers();
</script>
