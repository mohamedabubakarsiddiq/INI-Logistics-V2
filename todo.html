<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="css/todo.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>📋 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..." 
                    class="todo-input"
                    autocomplete="off">
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span>Total: <strong id="totalCount">0</strong></span>
                <span>Active: <strong id="activeCount">0</strong></span>
                <span>Completed: <strong id="completedCount">0</strong></span>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <p>📝 No tasks yet. Add one to get started!</p>
            </div>

            <div class="action-buttons">
                <button id="clearCompleted" class="clear-btn">Clear Completed</button>
                <button id="deleteAll" class="delete-all-btn">Delete All</button>
            </div>
        </div>
    </div>

    <script src="js/todo.js"></script>
</body>
</html>
